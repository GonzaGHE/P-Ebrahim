<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; color: #333; line-height: 1.6; }
    .container { max-width: 600px; margin: 0 auto; border: 1px solid #ddd; padding: 20px; border-radius: 5px; }
    .header { background: #222; color: #d4af37; padding: 10px; text-align: center; }
    .field { margin-bottom: 10px; }
    .label { font-weight: bold; width: 120px; display: inline-block; }
    .message { background: #f9f9f9; padding: 15px; border-left: 4px solid #d4af37; margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Nouvelle Demande de Contact</h2>
    </div>
    <p>Vous avez reçu un nouveau message via le site web.</p>
    
    <div class="field"><span class="label">Nom :</span> {{user_name}}</div>
    <div class="field"><span class="label">Email :</span> {{user_email}}</div>
    <div class="field"><span class="label">Téléphone :</span> {{user_phone}}</div>
    <div class="field"><span class="label">Sujet :</span> {{subject}}</div>
    
    <div class="field"><span class="label">Message :</span></div>
    <div class="message">{{message}}</div>
    
    <hr>
    <p style="font-size: 12px; color: #777;">Cet email a été envoyé automatiquement depuis ebrahimi-group.ch</p>
  </div>
</body>
</html>
